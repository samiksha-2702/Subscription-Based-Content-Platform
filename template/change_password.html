{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:rgba(10,15,30,0.7);
    backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.brand{
    font-size:26px;
    font-weight:800;
    background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.btn{
    padding:10px 16px;
    border-radius:10px;
    font-weight:600;
    border:none;
    cursor:pointer;
    text-decoration:none;
    transition:0.3s;
}

.btn-primary{
    background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:white;
}

.btn-danger{
    background:linear-gradient(135deg,#ef4444,#dc2626);
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* MAIN */
.container{
    max-width:1000px;
    margin:auto;
    padding:50px 20px;
}

.card{
    display:grid;
    grid-template-columns:300px 1fr;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(18px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
    overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

/* LEFT PANEL */
.side{
    padding:30px;
    background:linear-gradient(135deg,#1e293b,#020617);
    border-right:1px solid rgba(255,255,255,0.08);
}

.side h3{
    margin-bottom:10px;
}

.side p{
    font-size:13px;
    color:#9ca3af;
}

.security-icon{
    font-size:40px;
    margin-bottom:15px;
    color:#60a5fa;
}

/* FORM */
.form{
    padding:40px;
}

.title{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
}

/* FLOAT INPUT */
.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:14px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.1);
    background:#020617;
    color:white;
    outline:none;
}

.input-group label{
    position:absolute;
    left:12px;
    top:14px;
    font-size:13px;
    color:#9ca3af;
    transition:0.3s;
    background:#020617;
    padding:0 5px;
}

.input-group input:focus,
.input-group input:not(:placeholder-shown){
    border-color:#3b82f6;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
    top:-8px;
    font-size:11px;
    color:#60a5fa;
}

/* STRENGTH BAR */
.strength-bar{
    height:6px;
    border-radius:10px;
    background:#1f2937;
    overflow:hidden;
    margin-top:-10px;
    margin-bottom:15px;
}

.strength-fill{
    height:100%;
    width:0%;
    transition:0.3s;
}

/* COLORS */
.weak{background:#ef4444;width:30%;}
.medium{background:#f59e0b;width:60%;}
.strong{background:#22c55e;width:100%;}

/* MESSAGE */
.msg{
    background:#1f2937;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:14px;
}

/* BUTTON */
.submit-btn{
    width:100%;
    padding:14px;
    background:linear-gradient(135deg,#ef4444,#dc2626);
    border:none;
    border-radius:10px;
    color:white;
    font-weight:600;
    cursor:pointer;
}

.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* RESPONSIVE */
@media(max-width:768px){
    .card{
        grid-template-columns:1fr;
    }
    .side{
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.08);
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="brand">PrepEdge</div>
    <div>
        <a href="{% url 'profile' %}" class="btn btn-primary">Profile</a>
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>
</div>

<div class="container">

<div class="card">

<!-- LEFT -->
<div class="side">
    <div class="security-icon">
        <i class="fas fa-shield-alt"></i>
    </div>
    <h3>Security First</h3>
    <p>Use a strong password with a mix of letters, numbers & symbols.</p>
</div>

<!-- RIGHT -->
<div class="form">

<div class="title">
    <i class="fas fa-lock"></i> Change Password
</div>

{% if messages %}
    {% for message in messages %}
        <p class="msg">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<div class="input-group">
    <input type="password" name="current_password" placeholder=" " required>
    <label>Current Password</label>
</div>

<div class="input-group">
    <input type="password" id="new_password" name="new_password" placeholder=" " required>
    <label>New Password</label>
</div>

<div class="strength-bar">
    <div id="strengthFill" class="strength-fill"></div>
</div>

<div class="input-group">
    <input type="password" name="confirm_password" placeholder=" " required>
    <label>Confirm Password</label>
</div>

<button class="submit-btn">Update Password</button>

</form>

</div>
</div>

</div>

<script>
const password = document.getElementById("new_password");
const fill = document.getElementById("strengthFill");

password.addEventListener("input", () => {
    const val = password.value;

    fill.className = "strength-fill";

    if(val.length < 6){
        fill.classList.add("weak");
    } else if(/[A-Z]/.test(val) && /[0-9]/.test(val) && val.length >= 8){
        fill.classList.add("strong");
    } else {
        fill.classList.add("medium");
    }
});
</script>

</body>
</html>
