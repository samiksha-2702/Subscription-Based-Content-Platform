{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aptitude Test | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}
header{
    text-align:center;
    padding:20px;
    background:rgba(255,255,255,0.05);
}
.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}
.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}
.option{
    display:block;
    background:#1f2937;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    cursor:pointer;
}
.option:hover{
    background:#374151;
}
.btn{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:bold;
}
.score{
    text-align:center;
    font-size:22px;
    margin-top:20px;
}
.correct{
    background:#15803d !important;
}
.wrong{
    background:#b91c1c !important;
}
</style>
</head>
<body>

<header>
    <h1>🧠 Aptitude Test (25 Questions)</h1>
</header>

<div class="container">

<form id="quizForm">

<!-- Question 1 -->

    <h3>5. 100 ÷ 4?</h3>
    <label class="option"><input type="radio" name="q4" value="20">20</label>
    <label class="option"><input type="radio" name="q4" value="25">25</label>

<!-- Question 6 -->

<div class="card" data-answer="100">

    <label class="option"><input type="radio" name="q6" value="90">90</label>

    <label class="option"><input type="radio" name="q9" value="45">45</label>

<!-- Questions 11-25: replicate same pattern -->
<!-- Change question text, options, data-answer for all 25 -->

<button type="button" class="btn" onclick="calculateScore()">Submit Answers</button>

</form>

<div class="score" id="scoreDiv"></div>

</div>

<script>
function calculateScore() {
    let cards = document.querySelectorAll(".card");
    let score = 0;

    cards.forEach(card => {
        let correct = card.getAttribute("data-answer");
        let selected = card.querySelector('input[type="radio"]:checked');

        // Remove previous coloring
        card.querySelectorAll(".option").forEach(label => {
            label.classList.remove("correct","wrong");
        });

        if(selected){
            if(selected.value === correct){
                score++;
                selected.parentElement.classList.add("correct");
            } else {
                selected.parentElement.classList.add("wrong");
            }
        }
    });

    document.getElementById("scoreDiv").innerHTML = "🎯 Your Score: " + score + "/" + cards.length;
}
</script>

</body>
</html>
