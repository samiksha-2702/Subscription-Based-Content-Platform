{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interview Test | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}
header{text-align:center;padding:20px;background:rgba(255,255,255,0.05);}
.container{max-width:900px;margin:auto;padding:20px;}
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:10px;margin-bottom:15px;}
.option{display:block;background:#1f2937;padding:10px;margin:8px 0;border-radius:6px;cursor:pointer;}
.option:hover{background:#374151;}
.btn{padding:12px 20px;border:none;border-radius:8px;background:#22c55e;color:white;cursor:pointer;font-weight:bold;}
#timer{text-align:center;font-size:20px;margin-bottom:20px;}
</style>
</head>

<body>

<header>
<h1>🤝 Interview Test</h1>
<p id="timer">Time Left: 10:00</p>
</header>

<div class="container">

<form method="POST" action="{% url 'submit_test' test.id %}">
{% csrf_token %}

<div class="card">
<h3>1. How do you answer behavioral questions?</h3>
<label class="option"><input type="radio" name="q0" value="STAR">Use STAR Method</label>
<label class="option"><input type="radio" name="q0" value="Story">Tell Story</label>
<label class="option"><input type="radio" name="q0" value="Guess">Guess</label>
</div>

<div class="card">
<h3>2. How to prepare for company questions?</h3>
<label class="option"><input type="radio" name="q1" value="Research">Research the company</label>
<label class="option"><input type="radio" name="q1" value="Ignore">Ignore</label>
<label class="option"><input type="radio" name="q1" value="Random">Random</label>
</div>

<div class="card">
<h3>3. Should you ask questions at end?</h3>
<label class="option"><input type="radio" name="q2" value="Yes">Yes</label>
<label class="option"><input type="radio" name="q2" value="No">No</label>
</div>

<div class="card">
<h3>4. Important trait in interview?</h3>
<label class="option"><input type="radio" name="q3" value="Confidence">Confidence</label>
<label class="option"><input type="radio" name="q3" value="Speed">Speed</label>
<label class="option"><input type="radio" name="q3" value="Memory">Memory</label>
</div>

<button type="submit" class="btn">Submit Test</button>

</form>

</div>

<script>
// TIMER (ONLY UI)
let totalSeconds = 600;
let timerEl = document.getElementById("timer");

setInterval(() => {
    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;

    timerEl.innerHTML = `Time Left: ${minutes}:${seconds < 10 ? '0' + seconds : seconds}`;

    totalSeconds--;

    if (totalSeconds < 0) {
        alert("Time's up! Submitting test...");
        document.querySelector("form").submit(); // auto submit to Django
    }
}, 1000);
</script>

</body>
</html>
