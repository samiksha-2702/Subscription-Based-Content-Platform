{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Technical Practice | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

header{
    text-align:center;
    padding:20px;
    background:rgba(255,255,255,0.05);
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

select{
    padding:10px;
    border-radius:6px;
    border:none;
    font-size:16px;
    margin-bottom:20px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
    background:rgba(255,255,255,0.1);
}

.btn{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:bold;
    margin-right:10px;
}

.btn:hover{
    background:#16a34a;
}

.btn-clear{
    background:#ef4444;
}

.btn-clear:hover{
    background:#dc2626;
}

textarea{
    width:100%;
    margin-top:15px;
    background:#1f2937;
    color:white;
    border-radius:8px;
    padding:12px;
    border:none;
    font-family:monospace;
    font-size:14px;
}

#output{
    background:#111827;
    color:#00ffcc;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    min-height:60px;
}

.loader{
    display:none;
    margin-top:10px;
}

</style>
</head>

<body>

<header>
<h1>💻 Technical Practice</h1>
<p>Select language → Solve → Run Code</p>
</header>

<div class="container">

<!-- LANGUAGE SELECT -->
<select id="languageSelect" onchange="showQuestions()">
    <option value="">--Select Language--</option>
    <option value="python">Python</option>
    <option value="cpp">C++</option>
    <option value="java">Java</option>
</select>

<div id="quizForm"></div>

<!-- COMPILER -->
<h2>🖥️ Compiler</h2>

<form method="POST" action="{% url 'submit_test' test.id %}" id="submitForm">
    {% csrf_token %}

    <textarea id="codeInput" name="code" rows="12" placeholder="Select a question..."></textarea>

    <!-- HIDDEN SCORE -->
    <input type="hidden" name="score" id="scoreInput">

    <br><br>

    <button type="button" class="btn" onclick="runCode()">▶ Run</button>
    <button type="button" class="btn btn-clear" onclick="clearCode()">🗑 Clear</button>
    <button type="button" class="btn" onclick="submitTest()">📤 Submit Test</button>

</form>

<div class="loader" id="loader">⏳ Running...</div>

<pre id="output"></pre>

</div>

<script>

// QUESTIONS
const questions = {
    python: [
        { q: "Print Hello World", starter: "print('Hello World')" },
        { q: "Print square of number", starter: "n=int(input())\nprint(n*n)" }
    ],
    cpp: [
        { q: "Print Hello World", starter: "#include <iostream>\nusing namespace std;\nint main(){ cout<<\"Hello World\"; return 0; }" },
        { q: "Print square of number", starter: "#include <iostream>\nusing namespace std;\nint main(){ int n; cin>>n; cout<<n*n; return 0; }" }
    ],
    java: [
        { q: "Print Hello World", starter: "public class Main{\n public static void main(String[] args){\n System.out.println(\"Hello World\");\n }\n}" },
        { q: "Print square of number", starter: "import java.util.*;\npublic class Main{\n public static void main(String[] args){\n Scanner sc=new Scanner(System.in);\n int n=sc.nextInt();\n System.out.println(n*n);\n }\n}" }
    ]
};

// SHOW QUESTIONS
function showQuestions(){
    const lang = document.getElementById("languageSelect").value;
    const container = document.getElementById("quizForm");

    container.innerHTML = "";

    if(!lang) return;

    questions[lang].forEach((qObj, index)=>{
        let card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>Q${index+1}. ${qObj.q}</h3>
            <button class="btn" onclick="loadCode(${index})">Solve</button>
        `;

        container.appendChild(card);
    });
}

// LOAD CODE
function loadCode(index){
    const lang = document.getElementById("languageSelect").value;
    document.getElementById("codeInput").value = questions[lang][index].starter;
}

// RUN CODE (DEMO)
function runCode(){
    const code = document.getElementById("codeInput").value;
    const output = document.getElementById("output");
    const loader = document.getElementById("loader");

    if(!code){
        output.textContent = "⚠️ No code entered!";
        return;
    }

    loader.style.display = "block";
    output.textContent = "";

    setTimeout(()=>{
        loader.style.display = "none";

        if(code.includes("Hello")){
            output.textContent = "Hello World";
        }
        else if(code.includes("*")){
            output.textContent = "Output: (Demo)";
        }
        else{
            output.textContent = "Code executed successfully!";
        }
    },1000);
}

// CLEAR
function clearCode(){
    document.getElementById("codeInput").value = "";
    document.getElementById("output").textContent = "";
}

// SUBMIT TEST (IMPORTANT)
function submitTest(){

    // SIMPLE DEMO SCORE (you can enhance later)
    let score = 1;

    document.getElementById("scoreInput").value = score;

    document.getElementById("submitForm").submit();
}

</script>

</body>
</html>
