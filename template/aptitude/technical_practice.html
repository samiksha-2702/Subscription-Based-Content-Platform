{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Technical Practice | PrepEdge</title>

<style>
body{
    margin:0;
    font-family:"Segoe UI";
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:120px;
    margin-top:10px;
    background:#111827;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    font-family:monospace;
}

.btn{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

.output{
    background:#0b1220;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    color:#00ffcc;
}

#scoreBox{
    margin-top:20px;
    color:#4ade80;
}
</style>
</head>

<body>

<div class="container">

<h1>💻 Technical Practice</h1>

<form id="testForm" method="POST" action="{% url 'submit_test' test.id %}">
    {% csrf_token %}

    <!-- REQUIRED FOR DJANGO -->
    <input type="hidden" name="total" id="total">
    <input type="hidden" name="correct" id="correct">
    <input type="hidden" name="wrong" id="wrong">
    <input type="hidden" name="skipped" id="skipped">
    <input type="hidden" name="score" id="score">

    <!-- Q1 -->
    <div class="card">
        <h3>Q1. Print Hello World</h3>
        <textarea id="code1"></textarea>
        <button type="button" class="btn" onclick="run(1,'hello')">Run</button>
        <div class="output" id="out1"></div>
    </div>

    <!-- Q2 -->
    <div class="card">
        <h3>Q2. Square of a number</h3>
        <textarea id="code2"></textarea>
        <button type="button" class="btn" onclick="run(2,'square')">Run</button>
        <div class="output" id="out2"></div>
    </div>

    <!-- Q3 -->
    <div class="card">
        <h3>Q3. Add two numbers</h3>
        <textarea id="code3"></textarea>
        <button type="button" class="btn" onclick="run(3,'add')">Run</button>
        <div class="output" id="out3"></div>
    </div>

    <br>

    <button type="button" class="btn" onclick="submitTest()">📤 Submit Test</button>

</form>

<h2 id="scoreBox"></h2>

</div>

<script>

let scores = {q1:0,q2:0,q3:0};

// SAFE SIMULATION LOGIC
function normalize(code){
    return code
        .replace(/\s/g,'')   // remove spaces
        .toLowerCase();
}

function run(q,type){

    let code = document.getElementById("code"+q).value;
    let out = document.getElementById("out"+q);

    let cleaned = normalize(code);

    let result = "";
    let score = 0;

    if(type==="hello"){
        if(cleaned.includes("print(\"helloworld\")")){
            result="✅ Correct Output: Hello World";
            score=1;
        } else {
            result="❌ Wrong Answer";
        }
        scores.q1=score;
    }

    if(type==="square"){
        if(cleaned.includes("n") && cleaned.includes("*n") || cleaned.includes("n*n")){
            result="✅ Correct Logic (Square)";
            score=1;
        } else {
            result="❌ Wrong Logic";
        }
        scores.q2=score;
    }

    if(type==="add"){
        if(cleaned.includes("+")){
            result="✅ Addition Logic Detected";
            score=1;
        } else {
            result="❌ Wrong Logic";
        }
        scores.q3=score;
    }

    out.innerText = result;
}
// FINAL SUBMIT → DJANGO
function submitTest(){

    let total = 3;
    let correct = scores.q1 + scores.q2 + scores.q3;
    let wrong = total - correct;
    let skipped = 0;
    let finalScore = correct;

    // fill hidden inputs
    document.getElementById("total").value = total;
    document.getElementById("correct").value = correct;
    document.getElementById("wrong").value = wrong;
    document.getElementById("skipped").value = skipped;
    document.getElementById("score").value = finalScore;

    document.getElementById("scoreBox").innerText =
        "🎯 Score: " + finalScore + "/" + total;

    document.getElementById("testForm").submit();
}

</script>

</body>
</html>
