{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aptitude Test</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:white;
}

.container{max-width:900px;margin:auto;padding:20px}

.card{
    background:#111827;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
}

.option{display:block;margin:6px 0;cursor:pointer}

button{
    padding:12px 20px;
    background:#22c55e;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.timer{font-size:20px;color:#fb7185;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Aptitude Test</h2>
<div class="timer">Time Left: <span id="time">15:00</span></div>

<form id="quizForm" method="POST" action="{% url 'submit_test' test.id %}">
{% csrf_token %}

<!-- HIDDEN FIELDS (IMPORTANT FIX) -->
<input type="hidden" name="total" id="totalField">
<input type="hidden" name="correct" id="correctField">
<input type="hidden" name="wrong" id="wrongField">
<input type="hidden" name="skipped" id="skippedField">
<input type="hidden" name="time_taken" id="timeField">

<!-- Q1 -->
<div class="card">
<h3>1. What is 12 + 15?</h3>
<label class="option"><input type="radio" name="q0" value="25">25</label>
<label class="option"><input type="radio" name="q0" value="27">27</label>
<label class="option"><input type="radio" name="q0" value="28">28</label>
<label class="option"><input type="radio" name="q0" value="30">30</label>
</div>

<!-- Q2 -->
<div class="card">
<h3>2. What is 9 × 8?</h3>
<label class="option"><input type="radio" name="q1" value="72">72</label>
<label class="option"><input type="radio" name="q1" value="64">64</label>
<label class="option"><input type="radio" name="q1" value="70">70</label>
<label class="option"><input type="radio" name="q1" value="80">80</label>
</div>

<!-- Q3 -->
<div class="card">
<h3>3. Square of 7?</h3>
<label class="option"><input type="radio" name="q2" value="49">49</label>
<label class="option"><input type="radio" name="q2" value="42">42</label>
<label class="option"><input type="radio" name="q2" value="56">56</label>
<label class="option"><input type="radio" name="q2" value="63">63</label>
</div>

<!-- Q4 -->
<div class="card">
<h3>4. Cube of 3?</h3>
<label class="option"><input type="radio" name="q3" value="27">27</label>
<label class="option"><input type="radio" name="q3" value="9">9</label>
<label class="option"><input type="radio" name="q3" value="18">18</label>
<label class="option"><input type="radio" name="q3" value="36">36</label>
</div>

<!-- Q5 -->
<div class="card">
<h3>5. 100 ÷ 4?</h3>
<label class="option"><input type="radio" name="q4" value="25">25</label>
<label class="option"><input type="radio" name="q4" value="20">20</label>
<label class="option"><input type="radio" name="q4" value="30">30</label>
<label class="option"><input type="radio" name="q4" value="40">40</label>
</div>

<button type="button" onclick="submitQuiz()">Submit Test</button>

</form>
</div>

<script>

const answers = {
    q0:"27",
    q1:"72",
    q2:"49",
    q3:"27",
    q4:"25"
};

let timeLeft = 15 * 60;

function submitQuiz(){

    let correct = 0;
    let wrong = 0;
    let skipped = 0;

    for(let q in answers){
        let selected = document.querySelector(`input[name="${q}"]:checked`);

        if(!selected){
            skipped++;
        } else if(selected.value === answers[q]){
            correct++;
        } else {
            wrong++;
        }
    }

    let total = Object.keys(answers).length;

    // fill backend fields
    document.getElementById("totalField").value = total;
    document.getElementById("correctField").value = correct;
    document.getElementById("wrongField").value = wrong;
    document.getElementById("skippedField").value = skipped;

    let timeTaken = (15*60) - timeLeft;
    document.getElementById("timeField").value = timeTaken;

    document.getElementById("quizForm").submit();
}

// TIMER
function timer(){
    let m = Math.floor(timeLeft/60);
    let s = timeLeft % 60;

    document.getElementById("time").innerText =
        m + ":" + s.toString().padStart(2,"0");

    if(timeLeft <= 0){
        submitQuiz();
        return;
    }

    timeLeft--;
}

setInterval(timer,1000);

</script>

</body>
</html>
