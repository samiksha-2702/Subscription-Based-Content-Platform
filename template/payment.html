{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}
.checkout-wrapper {
    display: flex;
    gap: 30px;
    max-width: 1000px;
    width: 100%;
    padding: 20px;
}
.order-summary {
    flex: 1;
    padding: 40px;
    border-radius: 22px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(18px);
}
.price {
    font-size: 54px;
    font-weight: bold;
    margin: 25px 0;
}
.pay-card {
    flex: 1;
    padding: 40px;
    border-radius: 22px;
    background: white;
    color: black;
}
.btn-pay {
    background: #2563eb;
    color: white;
    padding: 16px;
    border-radius: 12px;
    border: none;
}
</style>
</head>

<body>

<div class="checkout-wrapper">

<div class="order-summary">
    <h2>🚀 PrepEdge Premium</h2>

    <div>
        <input type="radio" checked onclick="selectPlan('monthly',299)"> Monthly ₹299<br>
        <input type="radio" onclick="selectPlan('yearly',999)"> Yearly ₹999
    </div>

    <div class="price" id="priceDisplay">₹299</div>
</div>

<div class="pay-card">
    <button class="btn-pay" onclick="initiatePayment()">
        Pay ₹<span id="payAmount">299</span>
    </button>
</div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
let selectedAmount = 299;
let selectedPlan = 'monthly';

function selectPlan(plan, amount) {
    selectedPlan = plan;
    selectedAmount = amount;
    document.getElementById('priceDisplay').innerText = "₹" + amount;
    document.getElementById('payAmount').innerText = amount;
}

function getCookie(name) {
    let val = null;
    document.cookie.split(';').forEach(c => {
        const [k, v] = c.trim().split('=');
        if (k === name) val = decodeURIComponent(v);
    });
    return val;
}

function initiatePayment() {

    // ✅ STEP 1: Create Order from backend
    fetch('/create_order/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ plan: selectedPlan })
    })
    .then(res => res.json())
    .then(order => {

        const options = {
            key: "{{ RAZORPAY_KEY_ID }}",
            amount: order.amount,
            currency: "INR",
            order_id: order.id,

            name: "PrepEdge",
            description: selectedPlan + " subscription",

            handler: function (response) {

                // ✅ STEP 2: Verify payment
                fetch('/payment_verify/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: JSON.stringify({
                        razorpay_payment_id: response.razorpay_payment_id,
                        razorpay_order_id: response.razorpay_order_id,
                        razorpay_signature: response.razorpay_signature,
                        plan: selectedPlan
                    })
                })
                .then(res => res.json())
                .then(data => {

                    console.log("VERIFY RESPONSE:", data);

                    if (data.status === 'success') {
                        alert("Payment Successful 🎉");
                        window.location.href = "/profile/";
                    } else {
                        alert("Payment verification failed");
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert("Server error");
                });
            },

            prefill: {
                name: "{{ request.user.username }}",
                email: "{{ request.user.email }}"
            },

            theme: {
                color: "#2563eb"
            }
        };

        new Razorpay(options).open();
    })
    .catch(err => {
        console.error("ORDER ERROR:", err);
        alert("Unable to create order");
    });
}
</script>

</body>
</html>
