{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
}

.checkout-wrapper {
    display: flex;
    gap: 30px;
    max-width: 1000px;
    width: 100%;
    padding: 20px;
}

/* LEFT CARD */
.order-summary {
    flex: 1;
    padding: 40px;
    border-radius: 22px;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(18px);
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
}

.price {
    font-size: 54px;
    font-weight: bold;
    margin: 25px 0;
    background: linear-gradient(90deg, #3b82f6, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* RIGHT CARD */
.pay-card {
    flex: 1;
    padding: 40px;
    border-radius: 22px;
    background: white;
    color: black;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.btn-pay {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    border: none;
    padding: 16px;
    border-radius: 12px;
    font-size: 17px;
}

.badge-item {
    margin: 8px 0;
    font-size: 14px;
    color: #cbd5f5;
}

.secure-text {
    text-align: center;
    font-size: 13px;
    color: #6b7280;
    margin-top: 12px;
}

/* MOBILE FIX */
@media(max-width:768px){
    .checkout-wrapper{
        flex-direction: column;
    }
}
</style>

</head>

<body>

<div class="checkout-wrapper">


<!-- LEFT -->
<div class="order-summary">
    <h2>🚀 PrepEdge Premium</h2>
    <p>Unlock full access to premium content, tests & AI tools.</p>

    <!-- PLAN SELECTION -->
    <div class="mt-3">

        <div class="form-check">
            <input class="form-check-input" type="radio" name="plan" checked onclick="selectPlan('monthly',299)">
            <label class="form-check-label">Monthly - ₹299</label>
        </div>

        <div class="form-check mt-2">
            <input class="form-check-input" type="radio" name="plan" onclick="selectPlan('yearly',999)">
            <label class="form-check-label">Yearly - ₹999 🔥</label>
        </div>

    </div>

    <div class="price" id="priceDisplay">₹299</div>
    <p id="planText">/ month</p>

    <div class="mt-3">
        <div class="badge-item">🔒 Secure Razorpay Payment</div>
        <div class="badge-item">⚡ Instant Activation</div>
        <div class="badge-item">❌ No Hidden Charges</div>
        <div class="badge-item">📚 Full Premium Access</div>
    </div>
</div>

<!-- RIGHT -->
<div class="pay-card">
    <h3 class="mb-3">Complete Payment</h3>

    <button class="btn-pay" onclick="initiatePayment()">
        <i class="fas fa-lock"></i> Pay ₹<span id="payAmount">299</span> Securely
    </button>

    <div class="secure-text">
        🔐 Encrypted & Safe Payment
    </div>
</div>


</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
let selectedAmount = 299;
let selectedPlan = 'monthly';

function selectPlan(plan, amount) {
    selectedPlan = plan;
    selectedAmount = amount;

    document.getElementById('priceDisplay').innerText = "₹" + amount;
    document.getElementById('payAmount').innerText = amount;
    document.getElementById('planText').innerText = plan === 'yearly' ? "/ year" : "/ month";
}

function getCookie(name) {
    let val = null;
    document.cookie.split(';').forEach(c => {
        const [k, v] = c.trim().split('=');
        if (k === name) val = decodeURIComponent(v);
    });
    return val;
}

function initiatePayment() {

    const options = {
        key: "{{ RAZORPAY_KEY_ID }}",
        amount: selectedAmount * 100,
        currency: "INR",
        name: "PrepEdge",
        description: selectedPlan === 'yearly' ? "Yearly Premium" : "Monthly Premium",

        handler: function (response) {

            fetch('/payment/verify/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({
                    razorpay_payment_id: response.razorpay_payment_id,
                    plan: selectedPlan,
                    amount: selectedAmount
                })
            });

            alert("Payment Successful 🎉");
            window.location.href = '/profile/';
        },

        prefill: {
            name: "{{ request.user.username }}",
            email: "{{ request.user.email }}"
        },

        theme: {
            color: "#3b82f6"
        }
    };

    new Razorpay(options).open();
}
</script>

</body>
</html>
