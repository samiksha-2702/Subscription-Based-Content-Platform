<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ test.name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:#e5e7eb;
}

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}

.card{
background:#111827;
border-radius:12px;
padding:20px;
margin-bottom:20px;
}

.btn{
padding:10px 16px;
border-radius:8px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.result{
background:#1e3a8a;
padding:15px;
border-radius:10px;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>{{ test.name }}</h1>

<form id="mixedForm" method="POST" action="{% url 'submit_test' test.id %}">
    {% csrf_token %}

    <!-- Hidden fields -->
    <input type="hidden" name="total" id="total">
    <input type="hidden" name="correct" id="correct">
    <input type="hidden" name="wrong" id="wrong">
    <input type="hidden" name="skipped" id="skipped">
    <input type="hidden" name="score" id="score">
    <input type="hidden" name="time_taken" id="time_taken">

    <!-- MCQs -->

    <div class="card">
        <h3>1. Which of these is mutable?</h3>
        <label><input type="radio" name="q1" value="a"> Tuple</label>
        <label><input type="radio" name="q1" value="b"> List</label>
        <label><input type="radio" name="q1" value="c"> String</label>
    </div>

    <div class="card">
        <h3>2. 2**3 equals?</h3>
        <label><input type="radio" name="q2" value="a"> 6</label>
        <label><input type="radio" name="q2" value="b"> 8</label>
        <label><input type="radio" name="q2" value="c"> 9</label>
    </div>

    <!-- Coding -->

    <div class="card">
        <h3>3. Swap two numbers</h3>
        <textarea name="q3"></textarea>
    </div>

    <div class="card">
        <h3>4. Fibonacci</h3>
        <textarea name="q4"></textarea>
    </div>

    <button type="button" class="btn" onclick="submitMixed()">Submit Test</button>

</form>

</div>

<script>
function submitMixed(){

const mcqAnswers = {
q1:'b',
q2:'b'
};

let score = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;

let total = Object.keys(mcqAnswers).length;

for(let q in mcqAnswers){

const selected = document.querySelector(`input[name=${q}]:checked`);

if(!selected){
skipped++;
}
else if(selected.value === mcqAnswers[q]){
score++;
correct++;
} else {
wrong++;
}
}

// fill hidden fields
document.getElementById("total").value = total;
document.getElementById("correct").value = correct;
document.getElementById("wrong").value = wrong;
document.getElementById("skipped").value = skipped;
document.getElementById("score").value = score;
document.getElementById("time_taken").value = 60;

// submit form ONLY ONCE
document.getElementById("mixedForm").submit();

}
</script>

</body>
</html>
