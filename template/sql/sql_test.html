{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SQL 15-Min Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{margin:0;font-family:Segoe UI;background:linear-gradient(135deg,#020617,#0f172a);color:#e5e7eb;}
        .container{max-width:1000px;margin:auto;padding:25px;}
        h1{text-align:center;}
        .timer{text-align:center;font-size:22px;background:#ef4444;padding:12px;border-radius:8px;margin-bottom:20px;}
        .card{background:#111827;padding:20px;border-radius:14px;margin-bottom:16px;}
        button{padding:12px 18px;border:none;border-radius:8px;background:#16a34a;color:white;font-weight:600;cursor:pointer;}
        .result{background:#14532d;padding:16px;border-radius:8px;margin-top:20px;text-align:center;}
        .btn{background:#16a34a;color:white;padding:10px 14px;border-radius:8px;text-decoration:none;}
        .top{text-align:center;margin-bottom:15px;}
    </style>
</head>
<body>
<div class="container">
    <h1>SQL 15-Minute Test</h1>
    <div class="top">
        <a href="{% url 'sql_info' %}" class="btn">⬅ Back</a>
    </div>

    <div class="timer" id="timer">15:00</div>

    <form id="sqlForm">{% csrf_token %}</form>
    <button type="button" id="submitBtn">Submit Test</button>

    <div id="result"></div>
</div>

<script>
// ===== MCQs =====
const Q = [
    ["Which clause filters rows?",["GROUP","WHERE","ORDER","JOIN"],1],
    ["COUNT is",["Aggregate","Key","DDL","Join"],0],
    ["Primary key is",["Unique","Duplicate","Null","Text"],0],
    ["DELETE removes",["Table","Rows","DB","Index"],1],
    ["JOIN combines",["Tables","Columns","DB","Keys"],0],
    ["HAVING works with",["Groups","Rows","Keys","Index"],0],
    ["ORDER BY is for",["Sort","Delete","Join","Count"],0],
    ["INSERT is",["DDL","DML","DCL","TCL"],1],
    ["Foreign key references",["Parent","Child","Index","View"],0],
    ["Subquery is",["Nested query","Join","DDL","Loop"],0],
    ["UNIQUE allows null?",["Yes","No","Never","Only once"],0],
    ["GROUP BY used with",["Aggregate","Delete","Key","Join"],0]
];

const form = document.getElementById("sqlForm");

// Render MCQs
Q.forEach((q,i)=>{
    let html = `<div class="card"><b>${i+1}. ${q[0]}</b><br>`;
    q[1].forEach((opt,j)=>{
        html += `<input type="radio" name="q${i}" value="${j}"> ${opt}<br>`;
    });
    html += `</div>`;
    form.innerHTML += html;
});

// ===== TIMER =====
let time = 900; // 15 minutes
const timerEl = document.getElementById("timer");

const timerInterval = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time % 60;
    timerEl.innerText = `${m}:${s<10?"0":""}${s}`;
    time--;
    if(time < 0){
        clearInterval(timerInterval);
        submitTest();
    }
},1000);

// ===== SUBMIT FUNCTION =====
function submitTest() {
    // Calculate score
    let score = 0;
    Q.forEach((q,i)=>{
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        if(selected && parseInt(selected.value) === q[2]){
            score++;
        }
    });

    // CSRF token
    const csrfToken = document.querySelector('input[name="csrfmiddlewaretoken"]').value;

    // Send AJAX POST
    fetch("{% url 'submit_test' test.id %}", {
    method: "POST",
    headers: {
        "Content-Type": "application/x-www-form-urlencoded",
        "X-CSRFToken": csrfToken,
        "X-Requested-With": "XMLHttpRequest"   // ✅ IMPORTANT
    },
    body: new URLSearchParams({
        score: score,
        total: Q.length,
        correct: score,
        wrong: Q.length - score,
        skipped: 0,
        time_taken: 900 - time
    })

})
.then(resp => resp.json())
.then(data => {
    console.log(data);  // optional debug
    window.location.href = data.redirect_url;
})
.catch(err => console.error(err));
}

// Bind submit button
document.getElementById("submitBtn").addEventListener("click", submitTest);
</script>
</body>
</html>
