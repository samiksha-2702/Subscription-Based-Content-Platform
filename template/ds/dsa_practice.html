{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DSA Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#020617,#0f172a);
color:#e5e7eb;
}
.container{
max-width:900px;
margin:auto;
padding:20px;
}
.card{
background:#111827;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}
.btn{
padding:10px 15px;
background:#22c55e;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}
.progress{
background:#020617;
height:10px;
border-radius:6px;
margin-top:10px;
}
.progress-bar{
height:10px;
width:0%;
background:#22c55e;
}
textarea{
width:100%;
padding:10px;
margin-top:8px;
background:#0f172a;
color:white;
border:1px solid #1f2937;
border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>DSA Test</h1>

<form id="testForm">
{% csrf_token %}

<div class="card">
<h3>MCQs</h3>

<p>1. FIFO structure?</p>
<label><input type="radio" name="q1" value="0"> Stack</label>
<label><input type="radio" name="q1" value="1"> Queue</label>

<p>2. Bubble sort best case?</p>
<label><input type="radio" name="q2" value="1"> O(n)</label>
<label><input type="radio" name="q2" value="0"> O(n²)</label>

<p>3. Binary search needs?</p>
<label><input type="radio" name="q3" value="1"> Sorted</label>
<label><input type="radio" name="q3" value="0"> Unsorted</label>

<p>4. Uses nodes?</p>
<label><input type="radio" name="q4" value="1"> Linked List</label>
<label><input type="radio" name="q4" value="0"> Array</label>

</div>

<div class="card">
<h3>Descriptive</h3>
<textarea id="desc1" placeholder="Stack vs Queue"></textarea>
<textarea id="desc2" placeholder="Merge Sort"></textarea>
<textarea id="desc3" placeholder="Linked List vs Array"></textarea>
</div>

<div class="card">
<h3>Code Practice</h3>
<textarea id="code" placeholder="Write code here..."></textarea>
</div>

<button type="button" class="btn" onclick="submitTest()">Submit Test</button>

<p id="scoreText"></p>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

</form>
</div>

<script>

function submitTest(){

let score = 0;

// MCQ logic
for(let i=1;i<=4;i++){
    let options = document.getElementsByName("q"+i);
    for(let j=0;j<options.length;j++){
        if(options[j].checked && options[j].value=="1"){
            score++;
        }
    }
}

// UI update
document.getElementById("scoreText").innerText = "Score: "+score+"/4";
document.getElementById("bar").style.width = (score*25)+"%";

// CSRF
const csrf = document.querySelector('[name=csrfmiddlewaretoken]').value;

// SEND TO DJANGO
fetch("{% url 'submit_test' test.id %}", {
    method: "POST",
    headers: {
        "Content-Type": "application/x-www-form-urlencoded",
        "X-CSRFToken": csrf,
        "X-Requested-With": "XMLHttpRequest"
    },
    body: new URLSearchParams({
        score: score,
        total: 4,
        correct: score,
        wrong: 4 - score,
        skipped: 0,
        time_taken: 0,

        desc1: document.getElementById("desc1").value,
        desc2: document.getElementById("desc2").value,
        desc3: document.getElementById("desc3").value,
        desc4: "",
        desc5: ""
    })
})
.then(res => res.json())
.then(data => {
    window.location.href = data.redirect_url;
})
.catch(err => console.error(err));

}

</script>

</body>
</html>
