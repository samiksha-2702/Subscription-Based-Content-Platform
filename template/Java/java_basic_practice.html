{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ test.name }}</title>

<style>
body{
font-family:Segoe UI;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
padding:30px;
}

.card{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(14px);
padding:30px;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,.7);
}

.q{
margin:20px 0;
padding:18px;
background:#020617;
border-radius:12px;
}

label{display:block;margin:6px 0;cursor:pointer}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

.result{
margin-top:20px;
padding:18px;
border-radius:12px;
background:#111827;
}
</style>
</head>

<body>

<div class="card">
<h2>{{ test.name }}</h2>

<!-- ✅ IMPORTANT: FORM CONNECTED TO DJANGO -->
<form id="quizForm" method="POST" action="{% url 'submit_test' test.id %}">
{% csrf_token %}

<!-- hidden fields -->
<input type="hidden" name="total" id="total">
<input type="hidden" name="correct" id="correct">
<input type="hidden" name="wrong" id="wrong">
<input type="hidden" name="skipped" id="skipped">
<input type="hidden" name="score" id="score">
<input type="hidden" name="time_taken" id="time_taken">

<div class="q">1️⃣ Java is which type of language?
<label><input type="radio" name="q1" value="a"> Procedural</label>
<label><input type="radio" name="q1" value="b"> Object Oriented</label>
<label><input type="radio" name="q1" value="c"> Markup</label>
</div>

<div class="q">2️⃣ Entry point of Java program?
<label><input type="radio" name="q2" value="a"> main()</label>
<label><input type="radio" name="q2" value="b"> start()</label>
<label><input type="radio" name="q2" value="c"> init()</label>
</div>

<div class="q">3️⃣ int data type size?
<label><input type="radio" name="q3" value="a"> 2 bytes</label>
<label><input type="radio" name="q3" value="b"> 4 bytes</label>
<label><input type="radio" name="q3" value="c"> 8 bytes</label>
</div>

<div class="q">4️⃣ Print statement?
<label><input type="radio" name="q4" value="a"> echo()</label>
<label><input type="radio" name="q4" value="b"> print()</label>
<label><input type="radio" name="q4" value="c"> System.out.println()</label>
</div>

<div class="q">5️⃣ Java file extension?
<label><input type="radio" name="q5" value="a"> .class</label>
<label><input type="radio" name="q5" value="b"> .java</label>
<label><input type="radio" name="q5" value="c"> .js</label>
</div>

<button type="button" onclick="check()">Submit Test</button>

</form>

<div id="result"></div>

</div>

<script>
function check(){

const ans={q1:"b",q2:"a",q3:"b",q4:"c",q5:"b"};

let score=0,correct=0,wrong=0,skipped=0;
let total=5;
let html="";

for(let k in ans){

let v=document.querySelector(`input[name=${k}]:checked`);

if(!v){
skipped++;
html+=`Question ${k[1]} ❌ Skipped<br>`;
}
else if(v.value===ans[k]){
score++;
correct++;
html+=`Question ${k[1]} ✅ Correct<br>`;
}else{
wrong++;
html+=`Question ${k[1]} ❌ Correct Answer: ${ans[k].toUpperCase()}<br>`;
}

}

// percentage
let percent = (score/total)*100;

// ✅ fill hidden fields
document.getElementById("total").value = total;
document.getElementById("correct").value = correct;
document.getElementById("wrong").value = wrong;
document.getElementById("skipped").value = skipped;
document.getElementById("score").value = percent;
document.getElementById("time_taken").value = 60;

// show result
document.getElementById("result").innerHTML = `
<div class="result">
<h3>Score: ${score}/${total} (${percent.toFixed(2)}%)</h3>
${html}
<br>
<button onclick="location.reload()">Retry</button>
</div>`;

// ✅ SUBMIT TO DJANGO
document.getElementById("quizForm").submit();

}
</script>

</body>
</html>
