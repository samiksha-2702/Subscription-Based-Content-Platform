{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Programming Languages</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

header {
    text-align: center;
    padding: 40px 20px;
    background: rgba(15,23,42,0.7);
    backdrop-filter: blur(8px);
}

.container {
    padding: 40px 20px;
    max-width: 1200px;
    margin: auto;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 28px;
}

.card-link {
    text-decoration: none;
    color: white;
}

.card {
    background: linear-gradient(145deg, #111827, #0b1220);
    border-radius: 16px;
    padding: 30px 20px;
    text-align: center;
    transition: 0.35s ease;
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
}

.card img {
    width: 250px;
    height: 90px;
    object-fit: contain;
    margin-bottom: 14px;
}

footer {
    text-align: center;
    padding: 20px;
    margin-top: 40px;
    background: #020617;
    opacity: 0.7;
}
</style>
</head>

<body>

<header>
    <h1>Programming Languages</h1>
    <p>Select a language to continue</p>
</header>

<div class="container">
<div class="grid">

<!-- Python -->
<a href="{% url 'python_info' %}" class="card-link">
<div class="card">
    <img src="{% static 'image/python.jpg' %}" alt="Python">
    <h3>Python</h3>
</div>
</a>

<!-- Java -->
<a href="{% url 'javainfo' %}" class="card-link">
<div class="card">
    <img src="{% static 'image/java.png' %}" alt="Java">
    <h3>Java</h3>
</div>
</a>

<!-- C++ -->
<a href="{% url 'cppinfo' %}" class="card-link">
<div class="card">
    <img src="{% static 'image/cpp.png' %}" alt="C++">
    <h3>C++</h3>
</div>
</a>

<!-- JavaScript -->
<a href="{% url 'javasinfo' %}" class="card-link">
<div class="card">
    <img src="{% static 'image/javascript.png' %}" alt="JS">
    <h3>JavaScript</h3>
</div>
</a>

<!-- SQL -->
<a href="{% url 'sql_info' %}" class="card-link">
<div class="card">
    <img src="{% static 'image/sql.jpg' %}" alt="SQL">
    <h3>SQL</h3>
</div>
</a>

<!-- DSA -->
<a href="{% url 'dsa_info' %}" class="card-link">
<div class="card">
    <img src="{% static 'image/dsa.png' %}" alt="DSA">
    <h3>Data Structures</h3>
</div>
</a>

</div>
</div>

<footer>
© Interview Prep Platform
</footer>

</body>
</html>
