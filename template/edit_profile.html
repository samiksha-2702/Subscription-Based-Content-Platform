{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617);
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    background:rgba(10,15,30,0.7);
    backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.brand{
    font-size:26px;
    font-weight:800;
    background:linear-gradient(135deg,#60a5fa,#a78bfa,#f472b6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* BUTTONS */
.btn{
    padding:10px 18px;
    border-radius:10px;
    font-weight:600;
    border:none;
    cursor:pointer;
    transition:0.3s;
    text-decoration:none;
    display:inline-block;
}

.btn-primary{
    background:linear-gradient(135deg,#3b82f6,#6366f1);
    color:white;
}

.btn-secondary{
    background:rgba(255,255,255,0.08);
    color:white;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* MAIN LAYOUT */
.container{
    max-width:1100px;
    margin:auto;
    padding:50px 20px;
}

.card{
    display:grid;
    grid-template-columns:300px 1fr;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(18px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.08);
    overflow:hidden;
    box-shadow:0 30px 60px rgba(0,0,0,0.6);
}

/* LEFT PROFILE PANEL */
.profile-side{
    padding:30px;
    background:linear-gradient(135deg,#1e293b,#020617);
    text-align:center;
    border-right:1px solid rgba(255,255,255,0.08);
}

.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
    font-weight:700;
    margin:auto;
    margin-bottom:15px;
}

.profile-side h3{
    margin-bottom:5px;
}

.profile-side p{
    font-size:13px;
    color:#9ca3af;
}

/* RIGHT FORM */
.form-side{
    padding:40px;
}

.form-title{
    font-size:22px;
    font-weight:700;
    margin-bottom:20px;
}

/* FLOATING INPUT */
.input-group{
    position:relative;
    margin-bottom:20px;
}

.input-group input{
    width:100%;
    padding:14px 12px;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.1);
    background:#020617;
    color:white;
    outline:none;
    transition:0.3s;
}

.input-group label{
    position:absolute;
    left:12px;
    top:14px;
    font-size:13px;
    color:#9ca3af;
    transition:0.3s;
    pointer-events:none;
    background:#020617;
    padding:0 5px;
}

.input-group input:focus,
.input-group input:not(:placeholder-shown){
    border-color:#3b82f6;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
    top:-8px;
    font-size:11px;
    color:#60a5fa;
}

/* MESSAGE */
.msg{
    margin-bottom:15px;
    text-align:center;
    color:#facc15;
}

/* BUTTON GROUP */
.actions{
    display:flex;
    gap:12px;
    margin-top:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
    .card{
        grid-template-columns:1fr;
    }

    .profile-side{
        border-right:none;
        border-bottom:1px solid rgba(255,255,255,0.08);
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="brand">PrepEdge</div>
    <div>
        <a href="{% url 'profile' %}" class="btn btn-secondary">Back</a>
        <a href="{% url 'logout' %}" class="btn btn-primary">Logout</a>
    </div>
</div>

<div class="container">

<div class="card">

    <!-- LEFT SIDE -->
    <div class="profile-side">
        <div class="avatar">
            {{ user.username|first|upper }}
        </div>
        <h3>{{ user.username }}</h3>
        <p>{{ user.email }}</p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="form-side">

        <div class="form-title">
            <i class="fas fa-user-edit"></i> Edit Profile
        </div>

        {% if messages %}
            {% for message in messages %}
                <p class="msg">{{ message }}</p>
            {% endfor %}
        {% endif %}

        <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <input type="text" name="username" value="{{ user.username }}" placeholder=" " required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="email" name="email" value="{{ user.email }}" placeholder=" " required>
            <label>Email</label>
        </div>

    
        <div class="actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Changes
            </button>

            <a href="{% url 'profile' %}" class="btn btn-secondary">
                Cancel
            </a>
        </div>

        </form>

    </div>

</div>

</div>

</body>
</html>
