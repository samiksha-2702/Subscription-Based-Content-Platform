<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  min-height:100vh;
  background:linear-gradient(-45deg,#0f172a,#020617,#1e293b,#020617);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-family:Segoe UI, sans-serif;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* GLASS CARD */
.glass{
  width:400px;
  padding:40px;
  border-radius:24px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  box-shadow:0 25px 80px rgba(0,0,0,0.8);
  position:relative;
  overflow:hidden;
}

/* Glow */
.glass::before{
  content:"";
  position:absolute;
  width:250px;
  height:250px;
  background:radial-gradient(circle,#3b82f6,transparent);
  top:-80px;
  right:-80px;
  opacity:0.2;
}

/* BRAND */
.brand{
  font-size:28px;
  font-weight:800;
  text-align:center;
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* INPUT */
.form-control{
  background:rgba(255,255,255,0.12);
  border:none;
  color:white;
  border-radius:10px;
}

.form-control:focus{
  background:rgba(255,255,255,0.18);
  color:white;
  box-shadow:0 0 0 2px #3b82f6;
}

.form-control::placeholder{
  color:rgba(255,255,255,0.5);
}

/* BUTTON */
.btn-modern{
  background:linear-gradient(90deg,#3b82f6,#6366f1);
  border:none;
  border-radius:12px;
  font-weight:600;
  padding:12px;
  transition:0.3s;
}

.btn-modern:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(59,130,246,0.5);
}

/* ALERT */
.alert-error{
  background:rgba(239,68,68,0.2);
  border:1px solid rgba(239,68,68,0.4);
  color:#fca5a5;
  border-radius:10px;
  padding:10px;
  margin-bottom:15px;
}

/* PASSWORD */
.password-wrapper{
  position:relative;
}

.toggle-pass{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#9ca3af;
}

/* LINKS */
.link{
  font-size:13px;
  color:#93c5fd;
  text-decoration:none;
}

.link:hover{
  color:#60a5fa;
}

/* FOOT */
.back{
  display:block;
  text-align:center;
  margin-top:15px;
  color:#93c5fd;
  text-decoration:none;
}

.back:hover{
  color:#60a5fa;
}
</style>
</head>

<body>

<div class="glass">

  <div class="brand"> PrepEdge</div>
  <h5 class="text-center mb-4 text-secondary">Welcome Back</h5>

  {% if error %}
  <div class="alert-error">❌ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{% url 'login' %}">
    {% csrf_token %}

    <!-- Username -->
    <div class="mb-3">
      <input type="text" name="username" class="form-control"
             placeholder="Username"
             value="{{ username|default:'' }}" required autofocus>
    </div>

    <!-- Password -->
    <div class="mb-2 password-wrapper">
      <input type="password" id="password" name="password"
             class="form-control" placeholder="Password" required>
      <span class="toggle-pass" onclick="togglePass()">👁</span>
    </div>

    <div class="text-end mb-3">
      <a href="#" class="link">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-modern w-100 text-white">
      Login →
    </button>

  </form>

  <div class="text-center mt-3" style="font-size:14px;">
    New user?
    <a href="{% url 'register' %}" class="text-info">Create account</a>
  </div>

  <a href="{% url 'index' %}" class="back">← Back to Home</a>

</div>

<script>
function togglePass(){
  const field = document.getElementById("password");
  field.type = field.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
