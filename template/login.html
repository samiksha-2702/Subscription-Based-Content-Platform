<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
  min-height:100vh;
  background:linear-gradient(-45deg,#0f172a,#020617,#1e293b,#020617);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  display:flex;align-items:center;justify-content:center;
  color:white;
}
@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
.glass{
  width:380px;padding:40px;border-radius:22px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.form-control{background:rgba(255,255,255,0.15);border:none;color:white;}
.form-control:focus{background:rgba(255,255,255,0.2);color:white;box-shadow:none;border-color:#3b82f6;}
.form-control::placeholder{color:rgba(255,255,255,0.5);}
.btn-modern{
  background:linear-gradient(90deg,#3b82f6,#06b6d4);
  border:none;border-radius:12px;font-weight:bold;
  padding:12px;transition:opacity 0.2s;
}
.btn-modern:hover{opacity:0.9;}
.brand{color:#3b82f6;font-weight:bold;font-size:26px;text-align:center;}
.back{display:block;text-align:center;margin-top:15px;color:#93c5fd;text-decoration:none;}
.back:hover{color:#60a5fa;}
.alert-error{
  background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.4);
  color:#fca5a5;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:14px;
}
.label-white label{color:rgba(255,255,255,0.7);}
</style>
</head>

<body>
<div class="glass">
  <div class="brand">🎯 PrepEdge</div>
  <h5 class="text-center mb-4" style="color:rgba(255,255,255,0.8);">Welcome Back</h5>

  {% if error %}
  <div class="alert-error">❌ {{ error }}</div>
  {% endif %}

  <!-- FIXED: Real Django form — method POST, action to login URL, with CSRF token -->
  <form method="POST" action="{% url 'login' %}">
    {% csrf_token %}

    <div class="form-floating mb-3 label-white">
      <input
        type="text"
        name="username"
        id="id_username"
        class="form-control"
        placeholder="Username"
        value="{{ username|default:'' }}"
        required
        autofocus>
      <label for="id_username">Username</label>
    </div>

    <div class="form-floating mb-3 label-white">
      <input
        type="password"
        name="password"
        id="id_password"
        class="form-control"
        placeholder="Password"
        required>
      <label for="id_password">Password</label>
    </div>

    <button type="submit" class="btn btn-modern w-100 text-white">Login →</button>
  </form>

  <div class="text-center mt-3" style="font-size:14px;">
    New user? <a href="{% url 'register' %}" class="text-info">Create account</a>
  </div>

  <a href="{% url 'plans' %}" class="back">← Back to Home</a>
</div>
</body>
</html>
