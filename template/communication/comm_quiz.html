{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Communication Quiz | PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
}

header{
    text-align:center;
    padding:30px;
    background:#020617;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:25px;
}

.question{
    background:#111827;
    padding:18px;
    border-radius:10px;
    margin-bottom:18px;
}

button{
    padding:12px 25px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

.result{
    margin-top:25px;
    font-size:20px;
    color:#22c55e;
}

.correct{ color:#22c55e; }
.wrong{ color:#ef4444; }
</style>
</head>

<body>

<header>
<h1>Communication Skills Quiz</h1>
<p>Test your knowledge</p>
</header>

<div class="container">

<form id="quizForm" method="POST" action="{% url 'submit_test' test.id %}">
    {% csrf_token %}

    <!-- Hidden Fields -->
    <input type="hidden" name="total" id="total">
    <input type="hidden" name="correct" id="correct">
    <input type="hidden" name="wrong" id="wrong">
    <input type="hidden" name="skipped" id="skipped">
    <input type="hidden" name="score" id="score">
    <input type="hidden" name="time_taken" id="time_taken">
</form>

<button type="button" onclick="submitQuiz()">Submit Quiz</button>
<div id="result" class="result"></div>

</div>

<script>

// Questions Data
const questions = [
["Effective communication requires:",["Only speaking","Only listening","Both speaking and listening","None"],2],
["Eye contact shows:",["Confidence","Fear","Anger","Confusion"],0],
["Active listening means:",["Ignoring speaker","Full attention","Interrupting","Multitasking"],1],
["Body language is part of:",["Verbal","Non-verbal","Written","Formal"],1],
["Filler words should be:",["Used more","Avoided","Encouraged","Required"],1],
["Good communication improves:",["Misunderstanding","Conflicts","Relationships","Confusion"],2],
["Tone of voice shows:",["Emotion","Height","Weight","Dress"],0],
["Interrupting speaker is:",["Good habit","Bad habit","Required","Professional"],1],
["Posture reflects:",["Confidence","Weakness","Nothing","Noise"],0],
["Listening carefully helps:",["Understanding","Confusion","Delay","Noise"],0],
["Gestures are part of:",["Non-verbal","Written","Formal","Email"],0],
["Clear speech means:",["Mumbling","Confidence","Clarity","Silence"],2],
["Communication in interview must be:",["Rude","Clear","Loud","Fast"],1],
["Personal space is called:",["Proxemics","Kinesics","Chronemics","Semantics"],0],
["Smiling during talk shows:",["Confidence","Anger","Fear","Confusion"],0],
["Good listener should:",["Interrupt","Focus","Ignore","Sleep"],1],
["Verbal communication uses:",["Words","Gestures","Silence","Space"],0],
["Crossed arms show:",["Openness","Defensiveness","Confidence","Joy"],1],
["Professional communication should be:",["Clear","Rude","Confusing","Harsh"],0],
["Feedback in communication is:",["Response","Silence","Noise","Barrier"],0]
];

// Load Questions
document.addEventListener("DOMContentLoaded", function(){
    let form=document.getElementById("quizForm");

    questions.forEach((q,i)=>{
        let div=document.createElement("div");
        div.className="question";

        let html="<b>Q"+(i+1)+". "+q[0]+"</b><br>";

        q[1].forEach((opt,j)=>{
            html+=`
            <label>
                <input type="radio" name="q${i}" value="${j}">
                ${opt}
            </label><br>`;
        });

        html+=`<div id="ans${i}"></div>`;
        div.innerHTML=html;
        form.appendChild(div);
    });
});

// Submit Quiz
function submitQuiz(){
    let correct = 0;
    let wrong = 0;
    let skipped = 0;

    questions.forEach((q,i)=>{
        let selected = document.querySelector(`input[name="q${i}"]:checked`);
        let ansDiv = document.getElementById("ans"+i);

        if(selected){
            if(parseInt(selected.value) === q[2]){
                correct++;
                ansDiv.innerHTML = "<span class='correct'>✔ Correct</span>";
            }else{
                wrong++;
                ansDiv.innerHTML = "<span class='wrong'>✖ Wrong | Correct: "+q[1][q[2]]+"</span>";
            }
        }else{
            skipped++;
            ansDiv.innerHTML = "<span class='wrong'>Not attempted | Correct: "+q[1][q[2]]+"</span>";
        }
    });

    let total = questions.length;
    let score = Math.round((correct / total) * 100);

    // Show result
    document.getElementById("result").innerHTML =
        "🎯 Your Score: " + score + "%";

    // Fill hidden inputs
    document.getElementById("total").value = total;
    document.getElementById("correct").value = correct;
    document.getElementById("wrong").value = wrong;
    document.getElementById("skipped").value = skipped;
    document.getElementById("score").value = score;
    document.getElementById("time_taken").value = 60;

    // Submit to Django
    document.getElementById("quizForm").submit();
}

</script>

</body>
</html>
