{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>JavaScript Practice Zone</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e293b,#020617);
color:#e5e7eb;
}

.container{
max-width:1000px;
margin:auto;
padding:25px;
}

h1{text-align:center}

.section-title{
font-size:22px;
margin:30px 0 15px;
border-left:4px solid #3b82f6;
padding-left:10px;
}

.card{
background:#0f172a;
padding:20px;
border-radius:12px;
margin-bottom:18px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
margin-top:10px;
}

textarea{
width:100%;
min-height:120px;
padding:12px;
border-radius:8px;
border:1px solid #334155;
background:#020617;
color:white;
margin-top:10px;
}

.output{
background:black;
padding:10px;
border-radius:8px;
margin-top:10px;
color:#22c55e;
max-height:200px;
overflow:auto;
}

.result{
background:#16a34a;
padding:12px;
border-radius:8px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>JavaScript Practice Zone</h1>

<form method="POST" action="{% url 'submit_test' test.id %}" id="practiceForm">
{% csrf_token %}

<input type="hidden" name="mcq_score" id="mcq_score">
<input type="hidden" name="d1" id="d1_hidden">
<input type="hidden" name="d2" id="d2_hidden">
<input type="hidden" name="d3" id="d3_hidden">
<input type="hidden" name="d4" id="d4_hidden">
<input type="hidden" name="d5" id="d5_hidden">

<!-- ================= MCQ ================= -->
<div class="section-title">MCQ Practice</div>
<div id="mcqForm"></div>
<button type="button" onclick="checkMCQ()">Check MCQ Score</button>
<div id="mcqResult"></div>

<!-- ================= DESCRIPTIVE ================= -->
<div class="section-title">Descriptive Questions</div>

<div class="card">
<label><b>1. Difference between var, let, and const</b></label>
<textarea id="d1"></textarea>
</div>

<div class="card">
<label><b>2. Explain JavaScript data types</b></label>
<textarea id="d2"></textarea>
</div>

<div class="card">
<label><b>3. Explain for loop with example</b></label>
<textarea id="d3"></textarea>
</div>

<div class="card">
<label><b>4. What is function in JavaScript?</b></label>
<textarea id="d4"></textarea>
</div>

<div class="card">
<label><b>5. Explain OOP in JavaScript</b></label>
<textarea id="d5"></textarea>
</div>

<!-- ================= CODE ================= -->
<div class="section-title">Code Practice</div>
<textarea id="codeArea">console.log("Hello JS");</textarea>
<button type="button" onclick="runCode()">Run Code</button>
<div class="output" id="output"></div>

<button type="button" onclick="submitTest()">Submit All</button>

</form>

</div>

<script>

// ================= MCQ DATA =================
const mcqs = [
["JS data type?", ["String","Integer","Character","Decimal"], 0],
["typeof [] ?", ["object","array","list","undefined"], 0],
["Block scope keyword?", ["var","let","const","dim"], 1],
["=== operator?", ["Assign","Strict equality","Compare","None"], 1],
["Array end method?", ["push()","pop()","shift()","unshift()"], 0]
];

const formDiv = document.getElementById("mcqForm");

// ================= RENDER MCQ =================
mcqs.forEach((q,i)=>{
let html=`<div class="card"><b>${i+1}. ${q[0]}</b>`;
q[1].forEach((opt,j)=>{
html+=`<label><input type="radio" name="m${i}" value="${j}"> ${opt}</label>`;
});
html+=`</div>`;
formDiv.innerHTML+=html;
});

// ================= LOAD SAVED MCQ =================
mcqs.forEach((q,i)=>{
const saved=localStorage.getItem("mcq"+i);
if(saved!==null){
const radio=document.querySelector(`input[name=m${i}][value='${saved}']`);
if(radio) radio.checked=true;
}
document.querySelectorAll(`input[name=m${i}]`).forEach(r=>{
r.addEventListener("change",()=>localStorage.setItem("mcq"+i,r.value));
});
});

// ================= MCQ SCORE =================
function checkMCQ(){
let score=0;
mcqs.forEach((q,i)=>{
let ans=document.querySelector(`input[name=m${i}]:checked`);
if(ans && Number(ans.value)===q[2]) score++;
});
document.getElementById("mcqResult").innerHTML=`<div class="result">Score: ${score}/${mcqs.length}</div>`;
return score;
}

// ================= CODE RUNNER =================
function runCode(){
let code=document.getElementById("codeArea").value;
let output=document.getElementById("output");
output.innerHTML="";

const originalLog=console.log;
console.log=function(msg){output.innerHTML+=msg+"<br>";};

try{eval(code);}catch(e){output.innerHTML="Error: "+e.message;}

console.log=originalLog;
}

// ================= SUBMIT =================
function submitTest(){

if(!confirm("Submit test?")) return;

document.getElementById("mcq_score").value=checkMCQ();

// Save descriptive
for(let i=1;i<=5;i++){
document.getElementById("d"+i+"_hidden").value=
document.getElementById("d"+i).value;
}

document.getElementById("practiceForm").submit();
}

// ================= LOAD SAVED TEXT =================
window.onload=()=>{
for(let i=1;i<=5;i++){
document.getElementById("d"+i).value=
localStorage.getItem("desc"+i)||"";
}
};

// Auto save
for(let i=1;i<=5;i++){
document.getElementById("d"+i).addEventListener("input",e=>{
localStorage.setItem("desc"+i,e.target.value);
});
}

</script>

</body>
</html>
