<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrepEdge - Live Session Registration</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}

body{
background:#0f172a;
color:#e2e8f0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.form-container{
background:#1e293b;
padding:40px;
border-radius:15px;
max-width:500px;
width:100%;
box-shadow:0 8px 20px rgba(0,0,0,0.7);
}

h2{
color:#38bdf8;
text-align:center;
margin-bottom:30px;
font-size:2rem;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:12px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #38bdf8;
background:#273449;
color:#e2e8f0;
}

button{
width:100%;
background:#38bdf8;
color:#0f172a;
padding:15px;
font-size:1.1rem;
font-weight:bold;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
color:white;
}

.success{
text-align:center;
color:#22c55e;
font-weight:bold;
margin-top:10px;
}

.error{
text-align:center;
color:#f87171;
font-weight:bold;
margin-top:10px;
}

</style>
</head>

<body>

<div class="form-container">

<h2>Register for Live Session</h2>

<form method="POST">

{% csrf_token %}

<label>Full Name</label>
<input type="text" name="name" placeholder="Enter your full name" required>

<label>Email Address</label>
<input type="email" name="email" placeholder="Enter your email" required>

<label>Select Session</label>

<select name="session" required>
<option value="">-- Select a Session --</option>
<option value="Cloud Computing Essentials">Cloud Computing Essentials - 20 Feb 2026</option>
<option value="Data Science Interview Tips">Data Science Interview Tips - 25 Feb 2026</option>
</select>

<label>Message (Optional)</label>

<textarea name="message" rows="4" placeholder="Any questions or comments..."></textarea>

<button type="submit">Register Now</button>

</form>

{% if success %}
<p class="success">
Thank you! You have successfully registered for the session.
</p>
{% endif %}

{% if error %}
<p class="error">
Please fill all required fields.
</p>
{% endif %}

</div>

</body>
</html>
