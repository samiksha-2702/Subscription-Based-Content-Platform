<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ test.name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:#e5e7eb;
}
.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}
.card{
background:#111827;
border-radius:12px;
padding:20px;
margin-bottom:20px;
}
textarea{
width:100%;
height:120px;
background:#1f2937;
color:#e5e7eb;
border-radius:8px;
border:none;
padding:10px;
font-family:monospace;
}
.btn{
padding:10px 16px;
border-radius:8px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>{{ test.name }} (ID: {{ test.id }})</h1>

<form id="codingForm" method="POST" action="{% url 'submit_test' test.id %}">
{% csrf_token %}

<!-- Hidden fields -->
<input type="hidden" name="total" id="total">
<input type="hidden" name="correct" id="correct">
<input type="hidden" name="wrong" id="wrong">
<input type="hidden" name="skipped" id="skipped">
<input type="hidden" name="score" id="score">
<input type="hidden" name="time_taken" id="time_taken">

<div class="card">
<h3>1. Swap two numbers</h3>
<textarea name="q1"></textarea>
</div>

<div class="card">
<h3>2. Prime number check</h3>
<textarea name="q2"></textarea>
</div>

<div class="card">
<h3>3. Fibonacci</h3>
<textarea name="q3"></textarea>
</div>

<button type="button" class="btn" onclick="submitCoding()">Submit Test</button>

</form>

</div>

<script>
function submitCoding(){

let total = 3;
let correct = 0;
let wrong = 0;
let skipped = 0;

// simple scoring (you can upgrade later)
let score = 0;

// fill hidden fields
document.getElementById("total").value = total;
document.getElementById("correct").value = correct;
document.getElementById("wrong").value = wrong;
document.getElementById("skipped").value = skipped;
document.getElementById("score").value = score;
document.getElementById("time_taken").value = 60;

// submit form
document.getElementById("codingForm").submit();
}
</script>

</body>
</html>
