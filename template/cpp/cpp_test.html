{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C++ Practice Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0b1220, #050814);
    color:#e5e7eb;
    padding:25px;
    min-height:100vh;
    overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 40%),
    radial-gradient(circle at bottom right, rgba(168,85,247,.12), transparent 40%);
    z-index:-1;
}

/* HEADER */
.header{
    background: rgba(17, 24, 39, 0.85);
    backdrop-filter: blur(14px);
    padding: 22px;
    border-radius: 16px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.header h2{
    margin:0;
    font-size: 24px;
    color: #93c5fd;
    font-weight:800;
}

.timer{
    margin-top: 8px;
    font-size: 18px;
    color: #fb7185;
    font-weight: 700;
}

/* BUTTONS */
button, .btn{
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#2563eb,#1d4ed8);
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-right: 8px;
    transition: 0.3s;
    text-decoration:none;
    display:inline-block;
}

button:hover, .btn:hover{
    transform: translateY(-2px);
    box-shadow:0 10px 25px rgba(37,99,235,.3);
}

/* QUESTION CARD */
.question{
    background: rgba(2, 6, 23, 0.9);
    border: 1px solid rgba(255,255,255,0.05);
    padding: 18px;
    margin-bottom: 14px;
    border-radius: 14px;
    transition: 0.3s;
    position:relative;
    overflow:hidden;
}

.question::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(120deg,transparent,rgba(96,165,250,0.08),transparent);
    transition:0.7s;
}

.question:hover::before{
    left:100%;
}

.question:hover{
    border-color:#3b82f6;
    transform:translateY(-3px);
}

.question b{
    color: #93c5fd;
}

label{
    display:block;
    margin:6px 0;
    cursor:pointer;
    color:#cbd5e1;
    padding:8px;
    border-radius:8px;
    transition:0.2s;
}

label:hover{
    background:rgba(59,130,246,0.12);
}

input[type="radio"]{
    margin-right: 8px;
}

/* RESULT */
.result{
    background:#111827;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    display:none;
    border:1px solid rgba(255,255,255,0.05);
}

/* TOP BUTTON ROW */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

/* FLOATING HOME */
.floating-home{
    position:fixed;
    bottom:20px;
    right:20px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:22px;
    text-decoration:none;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* FLOATING INFO */
.floating-info{
    position:fixed;
    bottom:20px;
    left:20px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:20px;
    text-decoration:none;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
}

/* MOBILE */
@media(max-width:768px){
    body{ padding:16px; }
}

</style>
</head>

<body>

<div class="header">
    <h2>C++ Practice Test</h2>
    <div class="timer">Time Left: <span id="time">15:00</span></div>
</div>

<div class="topbar">

    <div>
        <button type="button" onclick="history.back()">← Back</button>
        <a href="{% url 'index' %}" class="btn">Home</a>
        <a href="{% url 'cppinfo' %}" class="btn">📘 C++ Info</a>
    </div>

</div>

<!-- FORM -->
<form id="quizForm" method="POST" action="{% url 'submit_test' test.id %}">
    {% csrf_token %}

    <input type="hidden" name="total" id="totalField">
    <input type="hidden" name="correct" id="correctField">
    <input type="hidden" name="wrong" id="wrongField">
    <input type="hidden" name="skipped" id="skippedField">
    <input type="hidden" name="time_taken" id="timeTakenField">
    <input type="hidden" name="score" id="scoreField">

    <!-- QUESTIONS (UNCHANGED) -->
    <div class="question">
        <b>Question 1</b><br>
        Who developed C++?
        <label><input type="radio" name="q1" value="a"> Dennis Ritchie</label>
        <label><input type="radio" name="q1" value="b"> Bjarne Stroustrup</label>
        <label><input type="radio" name="q1" value="c"> James Gosling</label>
    </div>

    <div class="question">
        <b>Question 2</b><br>
        Input operator in C++?
        <label><input type="radio" name="q2" value="a"> >></label>
        <label><input type="radio" name="q2" value="b"> <<</label>
        <label><input type="radio" name="q2" value="c"> ::</label>
    </div>

    <div class="question">
        <b>Question 3</b><br>
        Dynamic array container?
        <label><input type="radio" name="q3" value="a"> vector</label>
        <label><input type="radio" name="q3" value="b"> array</label>
        <label><input type="radio" name="q3" value="c"> pointer</label>
    </div>

    <div class="question">
        <b>Question 4</b><br>
        OOP stands for?
        <label><input type="radio" name="q4" value="a"> Object Oriented Programming</label>
        <label><input type="radio" name="q4" value="b"> Object Only Program</label>
        <label><input type="radio" name="q4" value="c"> Order Of Program</label>
    </div>

    <div class="question">
        <b>Question 5</b><br>
        Inheritance symbol?
        <label><input type="radio" name="q5" value="a"> extends</label>
        <label><input type="radio" name="q5" value="b"> inherits</label>
        <label><input type="radio" name="q5" value="c"> :</label>
    </div>

    <button type="button" onclick="submitQuiz()">Submit Test</button>
</form>

<div id="result" class="result"></div>

<!-- FLOATING BUTTONS -->
<a href="{% url 'index' %}" class="floating-home">🏠</a>
<a href="{% url 'cppinfo' %}" class="floating-info">📘</a>

<script>

/* SAME JS (UNCHANGED) */

const answers = {
    q1:"b",
    q2:"a",
    q3:"a",
    q4:"a",
    q5:"c"
};

let totalTime = 15 * 60;

function submitQuiz(){

    let correct = 0;
    let wrong = 0;
    let skipped = 0;

    for(let q in answers){
        let selected = document.querySelector(`input[name="${q}"]:checked`);

        if(!selected) skipped++;
        else if(selected.value === answers[q]) correct++;
        else wrong++;
    }

    let total = Object.keys(answers).length;

    document.getElementById("totalField").value = total;
    document.getElementById("correctField").value = correct;
    document.getElementById("wrongField").value = wrong;
    document.getElementById("skippedField").value = skipped;

    let timeTaken = (15*60) - totalTime;
    document.getElementById("timeTakenField").value = timeTaken;

    document.getElementById("scoreField").value = correct;

    document.getElementById("quizForm").submit();
}

/* TIMER */
function timer(){
    let m = Math.floor(totalTime/60);
    let s = totalTime % 60;

    document.getElementById("time").innerText =
        m + ":" + s.toString().padStart(2,"0");

    if(totalTime <= 0){
        submitQuiz();
        return;
    }

    totalTime--;
}

setInterval(timer,1000);

</script>

</body>
</html>
