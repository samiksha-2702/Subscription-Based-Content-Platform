{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>C++ 15 Minute Test — PrepEdge</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:#e5e7eb;
    font-family:Segoe UI, Arial;
    padding:25px;
    line-height:1.6;
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
    transform:translateY(-2px);
}

/* TIMER */
.timer{
    font-size:20px;
    font-weight:700;
    color:#f87171;
}

/* FORM */
.container{
    max-width:900px;
    margin:auto;
}

.card{
    background:rgba(17,24,39,0.95);
    border:1px solid rgba(59,130,246,0.15);
    padding:22px;
    border-radius:16px;
    margin-bottom:16px;
    transition:0.3s;
}

.card:hover{
    border-color:#3b82f6;
    transform:translateY(-3px);
}

.question{
    font-weight:600;
    margin-bottom:10px;
}

label{
    display:block;
    margin:6px 0;
    cursor:pointer;
    color:#cbd5e1;
}

input[type="radio"]{
    margin-right:8px;
}

/* SUBMIT */
.submit-btn{
    width:100%;
    padding:14px;
    font-size:16px;
    margin-top:10px;
}

/* RESULT BOX */
#result{
    display:none;
    padding:20px;
    border-radius:14px;
    background:#111827;
    border:1px solid #3b82f6;
    margin-top:20px;
}

.correct{color:#4ade80}
.wrong{color:#f87171}
</style>
</head>

<body>

<div class="container">

    <!-- TOP BAR -->
    <div class="topbar">
        <div>
            <button onclick="history.back()">Back</button>
            <a href="{% url 'index' %}">
                <button type="button">Module Home</button>
            </a>
        </div>

        <div class="timer">
            Time Left: <span id="time">15:00</span>
        </div>
    </div>

    <!-- FORM -->
    <form id="quizForm" method="POST" action="{% url 'submit_test' test.id %}">
        {% csrf_token %}

        <input type="hidden" name="total" id="totalField">
        <input type="hidden" name="correct" id="correctField">
        <input type="hidden" name="wrong" id="wrongField">
        <input type="hidden" name="skipped" id="skippedField">
        <input type="hidden" name="time_taken" id="timeTakenField">

        <!-- QUESTIONS -->

        <div class="card">
            <div class="question">1. Who developed C++?</div>
            <label><input type="radio" name="q1" value="a"> Dennis Ritchie</label>
            <label><input type="radio" name="q1" value="b"> Bjarne Stroustrup</label>
            <label><input type="radio" name="q1" value="c"> James Gosling</label>
        </div>

        <div class="card">
            <div class="question">2. Which symbol is used for input in C++?</div>
            <label><input type="radio" name="q2" value="a"> >></label>
            <label><input type="radio" name="q2" value="b"> <<</label>
            <label><input type="radio" name="q2" value="c"> ::</label>
        </div>

        <div class="card">
            <div class="question">3. Which is dynamic array container?</div>
            <label><input type="radio" name="q3" value="a"> vector</label>
            <label><input type="radio" name="q3" value="b"> array</label>
            <label><input type="radio" name="q3" value="c"> pointer</label>
        </div>

        <div class="card">
            <div class="question">4. OOP stands for?</div>
            <label><input type="radio" name="q4" value="a"> Object Oriented Programming</label>
            <label><input type="radio" name="q4" value="b"> Object Only Program</label>
            <label><input type="radio" name="q4" value="c"> Order Of Program</label>
        </div>

        <div class="card">
            <div class="question">5. Which keyword is used for inheritance?</div>
            <label><input type="radio" name="q5" value="a"> extends</label>
            <label><input type="radio" name="q5" value="b"> inherits</label>
            <label><input type="radio" name="q5" value="c"> :</label>
        </div>

        <button type="button" class="submit-btn" onclick="submitQuiz()">Submit Test</button>

    </form>

    <!-- RESULT -->
    <div id="result"></div>

</div>

<script>
const answers = {
    q1:"b",
    q2:"a",
    q3:"a",
    q4:"a",
    q5:"c"
};

let totalTime = 15 * 60;
let startTime = Date.now();

function submitQuiz(){

    let correct = 0;
    let wrong = 0;
    let skipped = 0;
    let total = Object.keys(answers).length;

    for(let q in answers){
        let selected = document.querySelector(`input[name="${q}"]:checked`);

        if(!selected){
            skipped++;
        }
        else if(selected.value === answers[q]){
            correct++;
        }
        else{
            wrong++;
        }
    }

    let timeTaken = Math.floor((Date.now() - startTime) / 1000);

    document.getElementById("totalField").value = total;
    document.getElementById("correctField").value = correct;
    document.getElementById("wrongField").value = wrong;
    document.getElementById("skippedField").value = skipped;
    document.getElementById("timeTakenField").value = timeTaken;

    document.getElementById("quizForm").requestSubmit();
}

/* TIMER */
function updateTimer(){

    let min = Math.floor(totalTime / 60);
    let sec = totalTime % 60;

    document.getElementById("time").innerText =
        `${min}:${sec.toString().padStart(2,"0")}`;

    if(totalTime <= 0){
        submitQuiz();
        return;
    }

    totalTime--;
}

setInterval(updateTimer, 1000);
</script>

</body>
</html>
