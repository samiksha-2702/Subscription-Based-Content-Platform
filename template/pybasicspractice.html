<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Python MCQ Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
* { box-sizing: border-box; }

body {
margin: 0;
font-family: "Segoe UI", Arial, sans-serif;
background: linear-gradient(135deg,#020617,#0f172a);
color: #e5e7eb;
}

header {
padding: 25px 20px;
text-align: center;
background: rgba(2,6,23,0.8);
backdrop-filter: blur(10px);
}

.container {
max-width: 900px;
margin: auto;
padding: 30px 20px;
}

.card {
background: #111827;
border-radius: 14px;
padding: 20px;
margin-bottom: 20px;
}

label {
display: block;
margin: 6px 0;
cursor: pointer;
}

.btn {
padding: 10px 16px;
border-radius: 8px;
background: #2563eb;
color: white;
border: none;
cursor: pointer;
}

.result {
background: rgba(59,130,246,0.2);
padding: 15px;
border-radius: 10px;
margin-top: 20px;
}
</style>
</head>

<body>

<header>
<h1>Python MCQ Test</h1>
</header>

<div class="container">

{% if test.id %}
<form id="mcqForm" method="POST" action="{% url 'submit_test' test.id %}">
{% else %}
<p>Error: Test ID not found</p>
{% endif %}
{% csrf_token %}

<!-- hidden fields -->
<input type="hidden" name="score" id="score">
<input type="hidden" name="correct" id="correct">
<input type="hidden" name="wrong" id="wrong">
<input type="hidden" name="skipped" id="skipped">
<input type="hidden" name="total" value="5">
<input type="hidden" name="time_taken" value="60">

<!-- QUESTIONS -->

<div class="card">
<h3>1. Which is mutable?</h3>
<label><input type="radio" name="q1" value="a"> Tuple</label>
<label><input type="radio" name="q1" value="b"> List</label>
<label><input type="radio" name="q1" value="c"> String</label>
<label><input type="radio" name="q1" value="d"> int</label>
</div>

<div class="card">
<h3>2. 2**3 = ?</h3>
<label><input type="radio" name="q2" value="a"> 6</label>
<label><input type="radio" name="q2" value="b"> 8</label>
<label><input type="radio" name="q2" value="c"> 9</label>
<label><input type="radio" name="q2" value="d"> 5</label>
</div>

<div class="card">
<h3>3. Function keyword?</h3>
<label><input type="radio" name="q3" value="a"> func</label>
<label><input type="radio" name="q3" value="b"> define</label>
<label><input type="radio" name="q3" value="c"> def</label>
<label><input type="radio" name="q3" value="d"> function</label>
</div>

<div class="card">
<h3>4. len([1,2,3]) = ?</h3>
<label><input type="radio" name="q4" value="a"> 2</label>
<label><input type="radio" name="q4" value="b"> 3</label>
<label><input type="radio" name="q4" value="c"> 4</label>
<label><input type="radio" name="q4" value="d"> None</label>
</div>

<div class="card">
<h3>5. Inheritance syntax?</h3>
<label><input type="radio" name="q5" value="a"> class B(A):</label>
<label><input type="radio" name="q5" value="b"> class B - A:</label>
<label><input type="radio" name="q5" value="c"> class B extends A:</label>
<label><input type="radio" name="q5" value="d"> class B inherits A:</label>
</div>

<button type="button" class="btn" onclick="submitMCQ()">Submit</button>

</form>

<div id="result" class="result" style="display:none;"></div>

</div>

<script>
function submitMCQ() {

const answers = {
q1:'b',
q2:'b',
q3:'c',
q4:'b',
q5:'a'
};

let score = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;

for (let q in answers) {

const selected = document.querySelector(`input[name=${q}]:checked`);

if (!selected) {
    skipped++;
} 
else if (selected.value === answers[q]) {
    correct++;
    score++;
} 
else {
    wrong++;
}
}

// set hidden values
document.getElementById("score").value = score;
document.getElementById("correct").value = correct;
document.getElementById("wrong").value = wrong;
document.getElementById("skipped").value = skipped;

// show result
document.getElementById("result").style.display = "block";
document.getElementById("result").innerHTML =
`<h3>Score: ${score}/5</h3>`;

// submit form
setTimeout(() => {
    document.getElementById("mcqForm").submit();
}, 1000);

}
</script>

</body>
</html>
