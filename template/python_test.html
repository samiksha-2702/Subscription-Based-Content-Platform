{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{{ test.name }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:"Segoe UI",Arial,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:#e5e7eb;
}

header{
padding:25px 20px;
text-align:center;
background:rgba(2,6,23,0.8);
backdrop-filter:blur(10px);
box-shadow:0 4px 30px rgba(0,0,0,0.6);
}

header h1{margin:0;font-size:28px}
header p{opacity:.7}

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
}

.card{
background:linear-gradient(145deg,#111827,#0b1220);
border-radius:14px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.6),
inset 0 0 0 1px rgba(255,255,255,0.05);
margin-bottom:20px;
}

.card h3{
margin-top:0;
color:#93c5fd;
}

label{
display:block;
margin:6px 0;
cursor:pointer;
}

textarea{
width:100%;
height:120px;
background:#1f2937;
color:#e5e7eb;
border-radius:8px;
border:none;
padding:10px;
font-family:monospace;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 16px;
border-radius:8px;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
font-weight:600;
border:none;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(37,99,235,.5);
}

#timer{
font-size:22px;
font-weight:bold;
color:#60a5fa;
text-align:center;
margin-bottom:20px;
}

footer{
text-align:center;
padding:25px;
opacity:.6;
}
</style>
</head>

<body>

<header>
<h1>{{ test.name }}</h1>
<p>Answer the questions before time runs out</p>
</header>

<div class="container">

<div id="timer">15:00</div>

<form id="quizForm" method="POST" action="{% url 'submit_test' test.id %}">
{% csrf_token %}

<!-- Hidden fields -->
<input type="hidden" name="total" id="total">
<input type="hidden" name="correct" id="correct">
<input type="hidden" name="wrong" id="wrong">
<input type="hidden" name="skipped" id="skipped">
<input type="hidden" name="score" id="score">
<input type="hidden" name="time_taken" id="time_taken">

<!-- QUESTIONS -->

<div class="card">
<h3>1. Which of these is mutable?</h3>
<label><input type="radio" name="q1" value="a"> Tuple</label>
<label><input type="radio" name="q1" value="b"> List</label>
<label><input type="radio" name="q1" value="c"> String</label>
</div>

<div class="card">
<h3>2. Output of 2**3 ?</h3>
<label><input type="radio" name="q2" value="a"> 6</label>
<label><input type="radio" name="q2" value="b"> 8</label>
<label><input type="radio" name="q2" value="c"> 9</label>
</div>

<div class="card">
<h3>3. Keyword used to define a function?</h3>
<label><input type="radio" name="q3" value="a"> func</label>
<label><input type="radio" name="q3" value="b"> define</label>
<label><input type="radio" name="q3" value="c"> def</label>
</div>

<div class="card">
<h3>4. Output of print(type([]) is list)?</h3>
<label><input type="radio" name="q4" value="a"> True</label>
<label><input type="radio" name="q4" value="b"> False</label>
<label><input type="radio" name="q4" value="c"> Error</label>
</div>

<button type="button" class="btn" onclick="submitQuiz()">Submit Test</button>

</form>

</div>

<footer>
© PrepEdge — Python Module
</footer>

<script>

let time = 900;

const timerDisplay = document.getElementById("timer");

const countdown = setInterval(()=>{
let min=Math.floor(time/60);
let sec=time%60;

timerDisplay.textContent =
`${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;

if(time<=0){
clearInterval(countdown);
submitQuiz();
alert("Time is up!");
}

time--;

},1000);


function submitQuiz(){

const answers = {
q1:"b",
q2:"b",
q3:"c",
q4:"a"
};

let score = 0;
let correct = 0;
let wrong = 0;
let skipped = 0;

let total = Object.keys(answers).length;

for(let q in answers){

const selected = document.querySelector(`input[name=${q}]:checked`);

if(!selected){
skipped++;
}
else if(selected.value === answers[q]){
score++;
correct++;
}
else{
wrong++;
}
}

// fill hidden fields
document.getElementById("total").value = total;
document.getElementById("correct").value = correct;
document.getElementById("wrong").value = wrong;
document.getElementById("skipped").value = skipped;
document.getElementById("score").value = score;
document.getElementById("time_taken").value = 900 - time;

// submit form to Django
document.getElementById("quizForm").submit();

}

</script>

</body>
</html>
